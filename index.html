<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natalia Rose Nail Spa | Danbury, CT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose: #c9807a;
    --rose-dark: #a85e58;
    --rose-light: #f2d9d7;
    --blush: #f9eeec;
    --gold: #c9a96e;
    --gold-light: #f0e4cc;
    --dark: #2c2220;
    --mid: #5c4a47;
    --light-text: #8a7370;
    --white: #ffffff;
    --off-white: #fdf8f7;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Montserrat', sans-serif;
    color: var(--dark);
    background: var(--off-white);
    overflow-x: hidden;
  }

  /* ========== NAVBAR ========== */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0 2rem;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    box-shadow: 0 2px 20px rgba(44,34,32,0.08);
    transition: all 0.3s ease;
  }
  .navbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: 600;
    color: var(--rose-dark);
    letter-spacing: 0.5px;
    text-decoration: none;
    line-height: 1.2;
  }
  .navbar-logo span {
    display: block;
    font-size: 0.55em;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    text-decoration: none;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--mid);
    transition: color 0.3s;
    cursor: pointer;
  }
  .nav-links a:hover { color: var(--rose); }
  .nav-cta {
    background: var(--rose) !important;
    color: var(--white) !important;
    padding: 10px 20px !important;
    border-radius: 30px !important;
    transition: background 0.3s !important;
  }
  .nav-cta:hover { background: var(--rose-dark) !important; }
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    min-height: 44px;
    min-width: 44px;
    justify-content: center;
    align-items: center;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--rose-dark);
    border-radius: 2px;
    transition: all 0.3s;
  }
  .mobile-menu {
    display: none;
    position: fixed;
    top: 70px; left: 0; right: 0;
    background: white;
    box-shadow: 0 10px 30px rgba(44,34,32,0.12);
    z-index: 999;
    padding: 1.5rem 2rem 2rem;
    flex-direction: column;
    gap: 0;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--mid);
    padding: 14px 0;
    border-bottom: 1px solid var(--rose-light);
    cursor: pointer;
  }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a:hover { color: var(--rose); }
  .mobile-cta-link {
    margin-top: 1rem;
    background: var(--rose);
    color: white !important;
    text-align: center;
    padding: 14px !important;
    border-radius: 30px !important;
    border-bottom: none !important;
  }

  /* ========== HERO ========== */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(44,34,32,0.65) 0%, rgba(160,80,80,0.35) 100%);
    z-index: 1;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 800px;
  }
  .hero-eyebrow {
    font-size: clamp(0.65rem, 1.5vw, 0.8rem);
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 1.2rem;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 6rem);
    font-weight: 300;
    color: white;
    line-height: 1.1;
    margin-bottom: 0.3rem;
  }
  .hero-title em {
    font-style: italic;
    color: var(--rose-light);
  }
  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    margin-bottom: 2rem;
